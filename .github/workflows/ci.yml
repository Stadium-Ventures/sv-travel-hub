name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (app + tests)
        run: npx tsc -b --force

      - name: Typecheck (api/)
        run: npx tsc -p tsconfig.api.json

      - name: Tests
        run: npx vitest run

      - name: Build
        run: npx vite build
